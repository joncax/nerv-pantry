apiVersion: apps/v1
kind: Deployment
metadata:
  name: nerv-pantry-frontend
  namespace: nerv-pantry
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nerv-pantry-frontend
  template:
    metadata:
      labels:
        app: nerv-pantry-frontend
    spec:
      containers:
        - name: frontend
          image: nerv-pantry-frontend:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: nerv-pantry-frontend
  namespace: nerv-pantry
spec:
  type: NodePort
  selector:
    app: nerv-pantry-frontend
  ports:
    - port: 80
      targetPort: 80
      nodePort: 30190
